# 接口自动化测试 - 定时执行工作流
name: API Auto Test - Daily Schedule

on:
  # 定时执行：每天 UTC 1:00 (北京时间 9:00)
  schedule:
    - cron: '0 1 * * *'
  
  # 支持手动触发
  workflow_dispatch:
    inputs:
      test_scope:
        description: '测试范围 (all/smoke)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - smoke

  # 支持提交代码时触发（可选启用）
#  push:
#    branches:
#      - main
#    paths:
#      - 'tests/**'
#      - 'api/**'
#      - 'core/**'
#      - 'config/**'
#      - 'conftest.py'
#      - 'requirements.txt'

jobs:
  api-test:
    name: API 自动化测试
    runs-on: ubuntu-latest
    # 核心修复：即使测试用例失败，Job 也标记为成功 (Success)
    continue-on-error: true
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      
      # 3. 安装 Python 依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

#      # ========== 核心优化：缓存 Playwright 浏览器文件 ==========
#      - name: Cache Playwright browsers
#        uses: actions/cache@v3
#        id: playwright-cache
#        with:
#          path: ~/.cache/ms-playwright/
#          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
#          restore-keys: |
#            ${{ runner.os }}-playwright-
#      # ===========================================================
#
#      # 4. 安装 Playwright 及 Chromium 浏览器
#      - name: Install Playwright and Chromium
#        run: |
#          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" == "true" ]; then
#            echo "✅ 命中 Playwright 浏览器缓存，跳过下载"
#          else
#            echo "🔄 未命中缓存，开始安装 Playwright 浏览器..."
#          fi
#          playwright install chromium
#          playwright install-deps chromium

      # 5. 配置环境变量
      - name: Configure environment
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
          EMAIL_ENABLED: ${{ secrets.EMAIL_ENABLED || 'false' }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          echo "PRIVATE_KEY=$PRIVATE_KEY" >> $GITHUB_ENV
          echo "BASE_URL=$BASE_URL" >> $GITHUB_ENV
          echo "EMAIL_ENABLED=$EMAIL_ENABLED" >> $GITHUB_ENV
          if [ "$EMAIL_ENABLED" = "true" ]; then
            echo "EMAIL_HOST=$EMAIL_HOST" >> $GITHUB_ENV
            echo "EMAIL_PORT=$EMAIL_PORT" >> $GITHUB_ENV
            echo "EMAIL_HOST_USER=$EMAIL_HOST_USER" >> $GITHUB_ENV
            echo "EMAIL_HOST_PASSWORD=$EMAIL_HOST_PASSWORD" >> $GITHUB_ENV
            echo "EMAIL_TO=$EMAIL_TO" >> $GITHUB_ENV
          fi

      # 6. 执行测试 (已修复：测试失败不中断流程)
      - name: Run API tests
        run: |
          mkdir -p reports
          
          if [ "${{ github.event.inputs.test_scope }}" == "smoke" ]; then
            echo "运行 Smoke 测试..."
            pytest tests/ -v --tb=short -k "login or checkin" --html=reports/smoke_report.html --self-contained-html
          else
            echo "运行完整测试..."
            pytest tests/ -v --tb=short --html=reports/full_report.html --self-contained-html
          fi

      # 7. 上传测试报告 (一定会执行)
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/*.html
          retention-days: 30

      # 8. 上传测试日志 (一定会执行)
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            .pytest_cache/
            **/pytest_output.txt
          retention-days: 7
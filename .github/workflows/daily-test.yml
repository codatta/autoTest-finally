# 接口自动化测试 - 定时执行工作流
name: API Auto Test - Daily Schedule

on:
  # 定时执行：每天 UTC 1:00 (北京时间 9:00)
  schedule:
    - cron: '0 1 * * *'
  
  # 支持手动触发
  workflow_dispatch:
    inputs:
      test_scope:
        description: '测试范围 (all/smoke)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - smoke

  # 支持提交代码时触发（可选启用）
#  push:
#    branches:
#      - main
#    paths:
#      - 'tests/**'
#      - 'api/**'
#      - 'core/**'
#      - 'config/**'
#      - 'conftest.py'
#      - 'requirements.txt'

jobs:
  api-test:
    name: API 自动化测试
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      
      # 3. 安装 Python 依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ========== 核心优化：缓存 Playwright 浏览器文件 ==========
      - name: Cache Playwright browsers
        uses: actions/cache@v3
        id: playwright-cache  # 标记缓存ID，后续可判断是否命中缓存
        with:
          # Playwright 浏览器文件默认缓存路径（Linux/macOS）
          path: ~/.cache/ms-playwright/
          # 缓存Key：系统+playwright+依赖文件哈希（依赖变更才重新缓存）
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
          # 回退Key：匹配同系统的最新缓存（即使依赖变更也能复用旧缓存）
          restore-keys: |
            ${{ runner.os }}-playwright-
      # ===========================================================

      # 4. 安装 Playwright 及 Chromium 浏览器（命中缓存则跳过下载）
      - name: Install Playwright and Chromium
        run: |
          # 打印缓存命中状态（方便调试）
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" == "true" ]; then
            echo "✅ 命中 Playwright 浏览器缓存，跳过下载"
          else
            echo "🔄 未命中缓存，开始安装 Playwright 浏览器..."
          fi
          
          # 安装浏览器（命中缓存时会自动跳过下载，仅验证安装）
          playwright install chromium
          # 安装系统依赖（Ubuntu 必需，缓存不包含系统库）
          playwright install-deps chromium

      # 5. 配置环境变量（使用 GitHub Secrets）
      - name: Configure environment
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
          # 邮件配置（可选）
          EMAIL_ENABLED: ${{ secrets.EMAIL_ENABLED || 'false' }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          echo "PRIVATE_KEY=$PRIVATE_KEY" >> $GITHUB_ENV
          echo "BASE_URL=$BASE_URL" >> $GITHUB_ENV
          echo "EMAIL_ENABLED=$EMAIL_ENABLED" >> $GITHUB_ENV
          if [ "$EMAIL_ENABLED" = "true" ]; then
            echo "EMAIL_HOST=$EMAIL_HOST" >> $GITHUB_ENV
            echo "EMAIL_PORT=$EMAIL_PORT" >> $GITHUB_ENV
            echo "EMAIL_HOST_USER=$EMAIL_HOST_USER" >> $GITHUB_ENV
            echo "EMAIL_HOST_PASSWORD=$EMAIL_HOST_PASSWORD" >> $GITHUB_ENV
            echo "EMAIL_TO=$EMAIL_TO" >> $GITHUB_ENV
          fi

      # 6. 执行测试
      - name: Run API tests
        run: |
          # 创建报告目录（避免报告生成失败）
          mkdir -p reports
          
          # 根据手动选择的范围运行测试
          if [ "${{ github.event.inputs.test_scope }}" == "smoke" ]; then
            echo "运行 Smoke 测试..."
            pytest tests/ -v --tb=short -k "login or checkin" --html=reports/smoke_report.html --self-contained-html
          else
            echo "运行完整测试..."
            pytest tests/ -v --tb=short --html=reports/full_report.html --self-contained-html
          fi

      # 7. 上传测试报告
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/*.html
          retention-days: 30

      # 8. 上传测试日志
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            .pytest_cache/
            **/pytest_output.txt
          retention-days: 7
# 接口自动化测试 - 定时执行工作流
name: API Auto Test - Daily Schedule

on:
  # 定时执行：每天 UTC 1:00 (北京时间 9:00)
  schedule:
    - cron: '0 1 * * *'
  
  # 支持手动触发
  workflow_dispatch:
    inputs:
      test_scope:
        description: '测试范围 (all/smoke)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - smoke

  # 支持提交代码时触发（可选启用）
  push:
    branches:
      - main
    paths:
      - 'tests/**'
      - 'api/**'
      - 'core/**'
      - 'config/**'
      - 'conftest.py'
      - 'requirements.txt'

jobs:
  api-test:
    name: API 自动化测试
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      
      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 4. 配置环境变量（使用 GitHub Secrets）
      - name: Configure environment
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
          # 邮件配置（可选）
          EMAIL_ENABLED: ${{ secrets.EMAIL_ENABLED || 'false' }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          echo "PRIVATE_KEY=$PRIVATE_KEY" >> $GITHUB_ENV
          echo "BASE_URL=$BASE_URL" >> $GITHUB_ENV
          echo "EMAIL_ENABLED=$EMAIL_ENABLED" >> $GITHUB_ENV
          if [ "$EMAIL_ENABLED" = "true" ]; then
            echo "EMAIL_HOST=$EMAIL_HOST" >> $GITHUB_ENV
            echo "EMAIL_PORT=$EMAIL_PORT" >> $GITHUB_ENV
            echo "EMAIL_HOST_USER=$EMAIL_HOST_USER" >> $GITHUB_ENV
            echo "EMAIL_HOST_PASSWORD=$EMAIL_HOST_PASSWORD" >> $GITHUB_ENV
            echo "EMAIL_TO=$EMAIL_TO" >> $GITHUB_ENV
          fi
      
      # 5. 执行测试
      - name: Run API tests
        run: |
          # 根据手动选择的范围运行测试
          if [ "${{ github.event.inputs.test_scope }}" == "smoke" ]; then
            echo "运行 Smoke 测试..."
            pytest tests/ -v --tb=short -k "login or checkin"
          else
            echo "运行完整测试..."
            pytest tests/ -v --tb=short
          fi
      
      # 6. 上传测试报告
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/*.html
          retention-days: 30
      
      # 7. 上传测试日志
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            .pytest_cache/
            **/pytest_output.txt
          retention-days: 7